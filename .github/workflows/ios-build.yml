name: Build Flutter iOS App (.ipa)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout your Flutter project
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Flutter
      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.7.  # Use Flutter 3.19 or newer

      # 3️⃣ Get Flutter dependencies
      - name: Get Flutter dependencies
        run: flutter pub get

      # 4️⃣ Build iOS app (no code signing)
      - name: Build iOS (Release, no codesign)
        run: flutter build ios --release --no-codesign

      # 5️⃣ Package app into an .ipa file
      - name: Package iOS .ipa file
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ios-build.ipa Payload
          rm -rf Payload

      # 6️⃣ Upload the .ipa file as an artifact
      - name: Upload iOS build (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios-build.ipa
